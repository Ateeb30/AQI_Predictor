name: Training Pipeline (Daily)

on:
  schedule:
    # Runs every day at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:  # Allow manual triggering from the GitHub UI

jobs:
  training-pipeline:
    name: Run Daily Training Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      AQICN_API_KEY:          ${{ secrets.AQICN_API_KEY }}
      OPENWEATHER_API_KEY:    ${{ secrets.OPENWEATHER_API_KEY }}
      HOPSWORKS_API_KEY:      ${{ secrets.HOPSWORKS_API_KEY }}
      HOPSWORKS_PROJECT_NAME: ${{ secrets.HOPSWORKS_PROJECT_NAME }}
      CITY:                   ${{ secrets.CITY }}
      CITY_LAT:               ${{ secrets.CITY_LAT }}
      CITY_LON:               ${{ secrets.CITY_LON }}

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🧠 Run training pipeline
        run: python pipelines/training_pipeline.py

      - name: 📊 Upload evaluation plots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: training-plots-${{ github.run_number }}
          path: outputs/plots/
          retention-days: 30
          if-no-files-found: ignore

      - name: 📝 Upload model artefacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: model-artefacts-${{ github.run_number }}
          path: outputs/models/
          retention-days: 30
          if-no-files-found: ignore
